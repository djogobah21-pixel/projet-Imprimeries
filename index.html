<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis SYL IMPRIMERIE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --secondary-color: #e67e22;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); padding: 20px; margin: 0; }
        #zoneFacture { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 20px auto; box-sizing: border-box; }
        h2 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .resultat { font-size: 1.2em; font-weight: bold; margin: 20px 0; color: var(--primary-color); }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; font-size: 1em; }
        .btn-whatsapp { background: #25d366; }
        .btn-email { background: #ea4335; }
        .btn-pdf { background: var(--primary-color); }
        .btn:hover { opacity: 0.9; }
        .facture-mode .btn { display: none !important; }
    </style>
</head>
<body>

<div id="zoneFacture">
    <h2>SYL IMPRIMERIE</h2>

    <label for="produit">Type de produit ou service :</label>
    <select id="produit" onchange="calculerDevis()">
        <option value="carte">Cartes de visite (Standard)</option>
        <option value="flyer">Flyers A5</option>
        <option value="bache">Bâche publicitaire (par m²)</option>
        <option value="invitation">Cartes d'invitation</option>
        <option value="cv">Impression CV (par page)</option>
        <option value="lettre">Lettre de motivation (par page)</option>
        <option value="photocopie_couleur">Photocopie Couleur (par page)</option>
        <option value="photocopie_nb">Photocopie Noir & Blanc (par page)</option>
        <option value="scannage">Scannage et envoi (par document)</option>
        <option value="impression_standard">Impression standard (par page)</option>
    </select>

    <label for="quantite">Quantité / Nombre de pages / M² :</label>
    <input type="number" id="quantite" value="100" min="1" oninput="calculerDevis()">

    <div class="resultat">
        Total estimé : <span id="prixTotal">0</span> FCFA
    </div>

    <div id="infosFacture" style="display: none; margin-top: 25px; color: #000000; font-size: 0.95em; border-top: 1px dashed #cbd5e0; padding-top: 15px;">
        <p><strong>Détails du devis :</strong></p>
        <p id="detailService" style="margin-left: 10px;"></p>
        <p>Généré le : <span id="dateFacture"></span></p>
        
        <div style="margin-top: 40px; border-top: 1px solid #cbd5e0; padding-top: 15px; font-size: 0.85em; color: #4a5568; line-height: 1.6;">
            <p style="font-weight: bold; margin-bottom: 5px; color: #000;">Nos Contacts :</p>
            • <strong>WhatsApp :</strong> +225 01 02 03 71 33<br>
            • <strong>E-mails :</strong> syl225imprimerie@gmail.com / djogobah21@gmail.com
        </div>
        <p style="margin-top: 30px; text-align: center; font-size: 0.8em; color: #718096; font-style: italic;">Merci pour votre confiance ! À bientôt chez SYL IMPRIMERIE.</p>
    </div>
            
    <button class="btn btn-whatsapp" onclick="envoyerWhatsApp()">Commander via WhatsApp</button>
    <button class="btn btn-email" onclick="envoyerEmail()">Commander par E-mail</button>
    <button class="btn btn-pdf" onclick="telechargerFacture()">Télécharger ma facture PDF</button>
</div>

<script>
    const TARIFS = {
        carte: 100,              
        flyer: 200,              
        bache: 7000,              
        invitation: 500,          
        cv: 500,                  
        lettre: 400,              
        photocopie_couleur: 100,  
        photocopie_nb: 50,        
        scannage: 200,            
        impression_standard: 100  
    };

    function calculerDevis() {
        const produitSelect = document.getElementById("produit");
        if (!produitSelect) return;

        const produitChoisi = produitSelect.value;
        const quantiteInput = document.getElementById("quantite");
        const quantite = parseInt(quantiteInput.value) || 0;

        const prixUnitaire = TARIFS[produitChoisi] || 0;
        const prixTotal = prixUnitaire * quantite;

        // Mise à jour propre du total avec séparateur de milliers
        document.getElementById("prixTotal").innerText = prixTotal.toLocaleString('fr-FR');
    }

    function envoyerWhatsApp() {
        const produitSelect = document.getElementById("produit");
        const nomProduit = produitSelect.options[produitSelect.selectedIndex].text;
        const quantite = document.getElementById("quantite").value;
        const prixTotal = document.getElementById("prixTotal").innerText;
        const numeroEntreprise = "2250102037133"; 

        const texteMessage = `Bonjour SYL IMPRIMERIE ! Je viens de simuler un devis sur votre site.\n\n` +
                             `*Service :* ${nomProduit}\n` +
                             `*Quantité / Pages :* ${quantite}\n` +
                             `*Total estimé :* ${prixTotal} FCFA\n\n` +
                             `Je souhaite valider cette commande avec vous.`;

        const lienWhatsApp = `https://wa.me/${numeroEntreprise}?text=${encodeURIComponent(texteMessage)}`;
        window.open(lienWhatsApp, '_blank');
    }

    function envoyerEmail() {
        const produitSelect = document.getElementById("produit");
        const nomProduit = produitSelect.options[produitSelect.selectedIndex].text;
        const quantite = document.getElementById("quantite").value;
        const prixTotal = document.getElementById("prixTotal").innerText;

        const emailPrincipal = "syl225imprimerie@gmail.com";
        const emailSecondaire = "djogobah21@gmail.com";
        const sujet = encodeURIComponent(`Nouvelle Commande Devis - SYL IMPRIMERIE`);
        
        const corpsMessage = encodeURIComponent(
            `Bonjour SYL IMPRIMERIE,\n\n` +
            `Je souhaite commander le service suivant d'après le simulateur en ligne :\n\n` +
            `- Produit : ${nomProduit}\n` +
            `- Quantité : ${quantite}\n` +
            `- Total estimé : ${prixTotal} FCFA\n\n` +
            `Merci de revenir vers moi.`
        );

        const lienEmail = `mailto:${emailPrincipal}?cc=${emailSecondaire}&subject=${sujet}&body=${corpsMessage}`;
        window.location.href = lienEmail;
    }

    function telechargerFacture() {
        const element = document.getElementById('zoneFacture');
        const produitSelect = document.getElementById("produit");
        const nomProduit = produitSelect.options[produitSelect.selectedIndex].text;
        const quantite = document.getElementById("quantite").value;
        
        document.getElementById('dateFacture').innerText = new Date().toLocaleDateString('fr-FR');
        document.getElementById('detailService').innerText = `• ${nomProduit} (Quantité : ${quantite})`;
        
        document.getElementById('infosFacture').style.display = 'block';
        document.body.classList.add('facture-mode');

        const options = {
            margin:       15,
            filename:     'Devis_SYL_IMPRIMERIE.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(options).from(element).save().then(() => {
            document.getElementById('infosFacture').style.display = 'none';
            document.body.classList.remove('facture-mode');
        }).catch((err) => {
            console.error(err);
            document.getElementById('infosFacture').style.display = 'none';
            document.body.classList.remove('facture-mode');
        });
    }

    // Sécurité additionnelle : calcul immédiat dès que le DOM est totalement chargé
    document.addEventListener("DOMContentLoaded", function() {
        calculerDevis();
    });
</script>

</body>
</html>
